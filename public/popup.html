<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Manager</title>
  <style>
    :root {
      --bg: #e0e0e0;
      --light-shadow: #ffffff;
      --dark-shadow: #bebebe;
      --accent: #3b82f6;
      --text-primary: #333333;
      --text-secondary: #666666;
      --radius-main: 16px;
      --radius-card: 12px;
      --shadow-flat: 8px 8px 16px var(--dark-shadow), -8px -8px 16px var(--light-shadow);
      --shadow-inset: inset 6px 6px 12px var(--dark-shadow), inset -6px -6px 12px var(--light-shadow);
      --shadow-pressed: inset 4px 4px 8px var(--dark-shadow), inset -4px -4px 8px var(--light-shadow);
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      width: 350px;
      padding: 24px;
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    button.button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius-main);
      background-color: var(--bg);
      box-shadow: var(--shadow-flat);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
      outline: none;
    }

    button.button:active {
      box-shadow: var(--shadow-pressed);
      transform: scale(0.98);
    }

    button.button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    button {
      white-space: nowrap;
    }
    
    #saveButton { color: var(--accent); }
    #loadButton { color: #10b981; }
    #openButton { color: #f59e0b; }
    #exportButton { color: #6366f1; }
    #importButton { color: #8b5cf6; }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 12px 16px;
      background-color: var(--bg);
      border-radius: var(--radius-main);
      box-shadow: var(--shadow-inset);
    }

    .switch-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .switch {
      width: 44px;
      height: 24px;
      background-color: var(--bg);
      border-radius: 12px;
      box-shadow: var(--shadow-flat);
      cursor: pointer;
      position: relative;
      transition: var(--transition);
    }

    .switch.active {
      box-shadow: var(--shadow-inset);
    }

    .switch-handle {
      width: 16px;
      height: 16px;
      background-color: var(--text-secondary);
      border-radius: 50%;
      position: absolute;
      top: 4px;
      left: 4px;
      transition: var(--transition);
    }

    .switch.active .switch-handle {
      left: 24px;
      background-color: var(--accent);
    }
    
    #tabList {
      margin-top: 24px;
      max-height: 350px;
      overflow-y: auto;
      padding: 4px;
    }

    #tabList::-webkit-scrollbar {
      width: 4px;
    }

    #tabList::-webkit-scrollbar-thumb {
      background: var(--dark-shadow);
      border-radius: 10px;
    }
    
    .tab-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      margin-top: 16px;
      background-color: var(--bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-flat);
      border: none;
      transition: var(--transition);
    }
    
    .tab-title {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    
    .tab-url {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .delButton {
      background: none;
      border: none;
      padding: 8px;
      border-radius: 50%;
      box-shadow: 4px 4px 8px var(--dark-shadow), -4px -4px 8px var(--light-shadow);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
    }

    .delButton:active {
      box-shadow: inset 2px 2px 4px var(--dark-shadow), inset -2px -2px 4px var(--light-shadow);
    }
    
    .message {
      padding: 10px;
      margin-top: 12px;
      border-radius: 6px;
      font-size: 14px;
    }
    
    .message.success {
      background-color: #d1fae5;
      color: #065f46;
      border: 1px solid #10b981;
    }
    
    .message.error {
      background-color: #fee2e2;
      color: #991b1b;
      border: 1px solid #ef4444;
    }
    
    .empty-state {
      margin-top: 24px;
      padding: 32px;
      text-align: center;
      color: var(--text-secondary);
      box-shadow: var(--shadow-inset);
      border-radius: var(--radius-main);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="toggle-container">
    <label class="switch-label">Merge with existing</label>
    <div class="switch" id="mergeToggle">
      <div class="switch-handle"></div>
    </div>
  </div>

  <div class="button-group">
    <button id="saveButton" class="button">Save Tabs</button>
    <button id="loadButton" class="button">Load Tabs</button>
    <button id="openButton" class="button" disabled>Open Tabs</button>
    <button id="exportButton" class="button">Export Tabs</button>
    <button id="importButton" class="button">Import Tabs</button>
  </div>
  
  <input type="file" id="fileInput" accept=".json" style="display: none;">

  <div id="messageContainer"></div>
  
  <script src="popup.js"></script>
</body>
</html>
